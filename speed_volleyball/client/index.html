<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Speed Volleyball Scoreboard</title>
  <script src="https://unpkg.com/qrcode/build/qrcode.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #f1f5f9; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card { background: #1e293b; border-radius: 16px; padding: 36px 40px; max-width: 520px; width: 100%; }
    h1 { font-size: 2rem; font-weight: 900; color: #38bdf8; margin-bottom: 4px; text-align: center; }
    .sub { color: #64748b; margin-bottom: 28px; text-align: center; }
    .links { display: flex; flex-direction: column; gap: 12px; }
    .link-row { display: grid; grid-template-columns: 1fr auto; align-items: center; gap: 12px; }
    .link-btn { display: block; padding: 16px 20px; border-radius: 10px; font-size: 1rem; font-weight: 700; color: #fff; text-decoration: none; }
    .link-btn:hover { filter: brightness(1.15); }
    .kiosk      { background: #1d4ed8; }
    .operator   { background: #065f46; }
    .scoreboard { background: #4c1d95; }
    .watch      { background: #7c2d12; }
    .qr-wrap { background: #0f172a; border-radius: 8px; padding: 6px; display: flex; align-items: center; justify-content: center; }
    .qr-wrap canvas { display: block; border-radius: 4px; }
    .url-strip { margin-top: 20px; padding-top: 20px; border-top: 1px solid #334155; text-align: center; }
    .url-strip .label { font-size: .75rem; color: #475569; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; }
    .url-strip code { font-size: .85rem; color: #94a3b8; background: #0f172a; padding: 6px 14px; border-radius: 6px; display: inline-block; word-break: break-all; }
  </style>
</head>
<body>
  <div class="card">
    <h1>⚡ Speed Volleyball</h1>
    <p class="sub">Scan or tap to open</p>
    <div class="links">
      <div class="link-row">
        <a class="link-btn kiosk"      href="/kiosk">📱 Player Kiosk</a>
        <div class="qr-wrap"><canvas id="qr-kiosk"></canvas></div>
      </div>
      <div class="link-row">
        <a class="link-btn operator"   href="/operator">🎮 Operator Panel</a>
        <div class="qr-wrap"><canvas id="qr-operator"></canvas></div>
      </div>
      <div class="link-row">
        <a class="link-btn scoreboard" href="/scoreboard">📺 Scoreboard (TV)</a>
        <div class="qr-wrap"><canvas id="qr-scoreboard"></canvas></div>
      </div>
      <div class="link-row">
        <a class="link-btn watch"      href="/watch">⌚ Watch Scorer</a>
        <div class="qr-wrap"><canvas id="qr-watch"></canvas></div>
      </div>
    </div>
    <div class="url-strip">
      <div class="label">Server address</div>
      <code id="server-url"></code>
    </div>
  </div>
  <script>
    const base = `http://${location.host}`;
    document.getElementById('server-url').textContent = base;
    const pages = [
      ['kiosk',      '/kiosk'],
      ['operator',   '/operator'],
      ['scoreboard', '/scoreboard'],
      ['watch',      '/watch'],
    ];
    const opts = { width: 72, margin: 1, color: { dark: '#f1f5f9', light: '#0f172a' } };
    pages.forEach(([id, path]) => {
      QRCode.toCanvas(document.getElementById(`qr-${id}`), base + path, opts);
    });
  </script>
</body>
</html>
