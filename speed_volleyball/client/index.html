<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Speed Volleyball Scoreboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #f1f5f9; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    a { color: #38bdf8; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .card { background: #1e293b; border-radius: 16px; padding: 40px 48px; max-width: 480px; width: 100%; text-align: center; }
    h1 { font-size: 2rem; font-weight: 900; color: #38bdf8; margin-bottom: 8px; }
    .sub { color: #64748b; margin-bottom: 32px; }
    .links { display: flex; flex-direction: column; gap: 16px; }
    .link-btn { display: block; padding: 18px 24px; border-radius: 10px; font-size: 1.1rem; font-weight: 700; }
    .kiosk     { background: #1d4ed8; }
    .operator  { background: #065f46; }
    .scoreboard{ background: #4c1d95; }
    .watch     { background: #7c2d12; }
  </style>
</head>
<body>
  <div class="card">
    <h1>⚡ Speed Volleyball</h1>
    <p class="sub">Choose a screen to open</p>
    <div class="links">
      <a class="link-btn kiosk"      href="/kiosk">📱 Player Kiosk</a>
      <a class="link-btn operator"   href="/operator">🎮 Operator Panel</a>
      <a class="link-btn scoreboard" href="/scoreboard">📺 Scoreboard (TV)</a>
      <a class="link-btn watch"      href="/watch">⌚ Watch Scorer</a>
    </div>
  </div>
</body>
</html>
